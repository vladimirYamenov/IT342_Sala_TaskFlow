spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT config (test values)
jwt.secret=testSecretKeyForJWTSigning1234567890ABCDEFabcdef
jwt.expiration=3600000

# Google OAuth (not used in unit tests)
google.client.id=test-google-client-id

# Mail (disabled in tests)
spring.mail.host=localhost
spring.mail.port=25
taskflow.mail.from=test@test.com

# File upload dir (temp)
file.upload-dir=./test-uploads
