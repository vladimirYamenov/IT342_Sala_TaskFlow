spring.application.name=TaskFlow
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Vrago_123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.error.include-message=always

# JWT Configuration
jwt.secret=${JWT_SECRET:a3f1b8e2c4d6e8f0a1b3c5d7e9f0a2b4c6d8e0f1a3b5c7d9e1f3a5b7c9d1e3}
jwt.expiration=86400000

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# Email (SMTP) - configure with your provider
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
taskflow.mail.from=${MAIL_FROM:noreply@taskflow.com}